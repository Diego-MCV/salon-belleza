apiVersion: v1
kind: Service
metadata:
  name: salon-belleza-svc
  namespace: salon-belleza
  labels:
    app: salon-belleza
spec:
  type: ClusterIP          # Expone internamente; el Ingress maneja el tráfico externo
  selector:
    app: salon-belleza
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
