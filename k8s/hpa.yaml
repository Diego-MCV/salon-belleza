apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: salon-belleza-hpa
  namespace: salon-belleza
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: salon-belleza
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Escala cuando el CPU supere 70%
